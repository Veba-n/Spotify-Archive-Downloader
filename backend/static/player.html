<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Archive Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/assets/css/player.css">
</head>

<body>

    <audio id="audio-player"></audio>
    <div class="toast" id="toast"></div>


    <div class="main-container">
        <!-- Sidebar Component -->
        <aside class="sidebar" id="sidebar"></aside>

        <!-- Dynamic Content Area -->
        <main class="content">
            <div class="welcome" id="welcome-msg">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z" />
                </svg>
                <p data-i18n="p_welcome">Select a playlist from the left</p>
            </div>
            <div id="playlist-view" style="display:none;"></div>
        </main>


        <!-- Details Panel Component -->
        <div id="details-panel" class="details-panel closed"></div>
    </div>

    <div class="player-bar">
        <div class="player-info">
            <div class="player-cover-wrap" id="cover-wrap" style="cursor: pointer;">
                <img id="now-cover" src="" alt="">
            </div>
            <div class="player-now">
                <div class="title" id="now-title"></div>
                <div class="artist" id="now-artist"></div>
            </div>
            <button class="btn btn-viz" id="btn-viz-toggle" title="Visualizer">
                <div class="viz-icon-chaos">
                    <span></span><span></span><span></span><span></span>
                    <span></span><span></span><span></span><span></span>
                </div>
            </button>


        </div>

        <div class="player-controls">
            <div class="control-buttons">
                <button class="btn" id="btn-shuffle" title="Shuffle">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="16 3 21 3 21 8"></polyline>
                        <line x1="4" y1="20" x2="21" y2="3"></line>
                        <polyline points="21 16 21 21 16 21"></polyline>
                        <line x1="15" y1="15" x2="21" y2="21"></line>
                        <line x1="4" y1="4" x2="9" y2="9"></line>
                    </svg>
                </button>
                <button class="btn" id="btn-prev">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="19 20 9 12 19 4 19 20"></polygon>
                        <line x1="5" y1="4" x2="5" y2="20"></line>
                    </svg>
                </button>
                <button class="btn btn-play" id="btn-play">
                    <svg id="icon-play" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                    </svg>
                    <svg id="icon-pause" style="display:none" width="20" height="20" viewBox="0 0 24 24"
                        fill="currentColor">
                        <rect x="6" y="4" width="4" height="16"></rect>
                        <rect x="14" y="4" width="4" height="16"></rect>
                    </svg>
                </button>
                <button class="btn" id="btn-next">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="5 4 15 12 5 20 5 4"></polygon>
                        <line x1="19" y1="4" x2="19" y2="20"></line>
                    </svg>
                </button>
                <button class="btn" id="btn-repeat" title="Repeat">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="17 1 21 5 17 9"></polyline>
                        <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
                        <polyline points="7 23 3 19 7 15"></polyline>
                        <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
                        <text x="12" y="15" font-size="8" font-weight="bold" fill="currentColor" class="repeat-one-text"
                            style="display:none">1</text>
                    </svg>
                </button>
            </div>
            <div class="progress-wrap">
                <span id="time-current">0:00</span>
                <div class="progress-bar" id="progress-bar">
                    <div class="progress-fill" id="progress-fill">
                        <div class="progress-thumb"></div>
                    </div>
                </div>
                <span id="time-total">0:00</span>
            </div>
        </div>

        <div class="player-extra">
            <button class="btn" id="btn-sidebar-toggle" title="Library View">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="9" y1="3" x2="9" y2="21"></line>
                </svg>
            </button>
            <button class="btn" id="btn-details-toggle" title="Show Details">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="15" y1="3" x2="15" y2="21"></line>
                </svg>
            </button>
            <button class="btn" id="btn-lyrics-toggle" title="Lyrics">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                    <line x1="12" y1="19" x2="12" y2="23"></line>
                    <line x1="8" y1="23" x2="16" y2="23"></line>
                </svg>
            </button>
            <div class="volume-wrap">

                <button class="btn" id="btn-vol">
                    <svg id="vol-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M11 5L6 9H2v6h4l5 4V5z" class="vol-speaker"></path>
                        <path d="M15.54 8.46a5 5 0 0 1 0 7.07" class="vol-wave-1"></path>
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14" class="vol-wave-2"></path>
                        <line x1="23" y1="9" x2="17" y2="15" class="vol-mute-x" style="display:none"></line>
                        <line x1="17" y1="9" x2="23" y2="15" class="vol-mute-x" style="display:none"></line>
                    </svg>
                </button>
                <div class="volume-bar" id="volume-bar">
                    <div class="volume-fill" id="volume-fill"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <!-- Modals -->
    <div id="modal-edit-track" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit Track</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="edit-title">
                </div>
                <div class="form-group">
                    <label>Artists (comma separated)</label>
                    <input type="text" id="edit-artists">
                </div>
                <div class="form-group">
                    <label>Album</label>
                    <input type="text" id="edit-album">
                </div>
                <div class="form-group">
                    <label>Cover Image</label>
                    <div class="cover-upload-area" id="edit-cover-area">
                        <img id="edit-cover-preview" src="" alt="" class="cover-preview">
                        <span class="cover-upload-label">Click to change cover</span>
                        <input type="file" id="edit-cover-file" hidden accept="image/*">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-cancel">Cancel</button>
                <button class="btn btn-confirm primary">Save Changes</button>
            </div>
        </div>
    </div>

    <div id="modal-edit-playlist" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit Playlist</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Playlist Name</label>
                    <input type="text" id="edit-playlist-name">
                </div>
                <div class="form-group">
                    <label>Cover Image</label>
                    <div class="cover-upload-area" id="edit-playlist-cover-area">
                        <img id="edit-playlist-cover-preview" src="" alt="" class="cover-preview">
                        <span class="cover-upload-label">Click to change cover</span>
                        <input type="file" id="edit-playlist-cover-file" hidden accept="image/*">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-cancel">Cancel</button>
                <button class="btn btn-confirm primary">Save Changes</button>
            </div>
        </div>
    </div>

    <div id="modal-settings" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 data-i18n="p_settings">Settings</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label data-i18n="p_lang">Language</label>
                    <div class="settings-lang-switcher">
                        <button id="set-lang-en" class="btn-lang">English</button>
                        <button id="set-lang-tr" class="btn-lang">Türkçe</button>
                    </div>
                </div>
                <div class="form-group">
                    <label data-i18n="p_genius_key">Genius API Key</label>
                    <input type="password" id="settings-genius-key" placeholder="Enter Genius API Key">
                    <p class="input-help">
                        <span data-i18n="p_genius_help">Used for fetching lyrics.</span>
                        <a href="https://genius.com/api-clients/new" target="_blank"
                            style="color: var(--primary); display: block; margin-top: 4px;">Get API Key here</a>
                    </p>
                </div>

            </div>
            <div class="modal-footer">
                <button class="btn btn-cancel" data-i18n="p_btn_cancel">Cancel</button>
                <button class="btn btn-confirm primary" data-i18n="p_btn_save">Save Settings</button>
            </div>
        </div>
    </div>

    <div id="modal-confirm" class="modal">
        <div class="modal-content small">
            <div class="modal-header">
                <h3>Confirm Action</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <p id="confirm-msg">Are you sure you want to perform this action?</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-cancel">No</button>
                <button class="btn btn-confirm destructive">Proceed</button>
            </div>
        </div>
    </div>

    <div id="lyrics-view" class="lyrics-view" style="display:none;">
        <div class="immersive-header" id="lyrics-header">
            <div class="header-now-playing">
                <span class="label" data-i18n="p_now_playing">Now Playing</span>
                <span class="imm-track-info">...</span>
            </div>
            <button class="btn-close-immersive" id="btn-close-lyrics" title="Close"><svg viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg></button>
        </div>
        <div class="lyrics-content">
            <div id="lyrics-text"></div>
            <div id="lyrics-credit"></div>
        </div>
    </div>


    <!-- Main Entry Point -->
    <script type="module" src="/static/assets/js/app.js"></script>
    <div id="visualizer-container" class="visualizer-container hidden">
        <canvas id="visualizer-canvas"></canvas>
        <div class="immersive-header" id="viz-header">
            <div class="header-now-playing">
                <span class="label" data-i18n="p_now_playing">Now Playing</span>
                <span class="imm-track-info">...</span>
            </div>
            <button class="btn-close-immersive" id="btn-close-viz-full" title="Exit Fullscreen"><svg viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg></button>
        </div>
        <div class="visualizer-hit-area"></div>


        <div class="visualizer-hud">
            <button class="viz-hud-btn" id="viz-drag" title="Drag">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20" />
                </svg>
            </button>
            <button class="viz-hud-btn" id="viz-full" title="Fullscreen">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7" />
                </svg>
            </button>
            <button class="viz-hud-btn" id="viz-scale" title="Scale / Reset">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 12a9 9 0 1 0 18 0 9 9 0 0 0-18 0M12 8v8M8 12h8" />
                </svg>
            </button>
        </div>
    </div>

</body>


</html>

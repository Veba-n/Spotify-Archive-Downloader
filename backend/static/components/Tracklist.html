<div class="header" id="main-header">
    <div class="header-bg" id="header-bg"></div>
    <img src="" alt="Cover" class="header-cover" id="header-cover">
    <div class="header-details">
        <span class="label" data-i18n="p_playlist_label">Playlist</span>
        <h1 id="header-title" data-i18n="p_my_list">My List</h1>
        <span class="meta" id="header-meta">0 Tracks</span>
    </div>
</div>

<div style="padding: 0 32px 16px; display: flex; justify-content: flex-end;">
    <div class="search-box" style="margin: 0; min-width: 240px;">
        <svg viewBox="0 0 16 16">
            <path
                d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85-.017.016zm-5.442.156a5 5 0 1 1 0-10 5 5 0 0 1 0 10z" />
        </svg>
        <input type="text" id="track-search-input" placeholder="Search tracks..." data-i18n-ph="p_search_tr">
    </div>
</div>

<div class="track-section">
    <table class="track-list">
        <thead>
            <tr>
                <th style="width: 44px; text-align: center;">#</th>
                <th data-i18n="p_th_track" data-sort="title">Track</th>
                <th data-i18n="p_th_album" data-sort="album">Album</th>
                <th data-sort="duration" style="text-align: right; padding-right: 12px;">Duration</th>
                <th style="width: 80px;"></th>
            </tr>
        </thead>
        <tbody id="track-body"></tbody>
    </table>
</div>
